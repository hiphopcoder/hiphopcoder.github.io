<!DOCTYPE HTML>
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en" lang="en">

<head>
	<title>Our Love Story</title>
	<meta http-equiv="content-type" content="text/html; charset=UTF-8">
	<style type="text/css">
		@font-face {
			font-family: digit;
			src: url('digital-7_mono.ttf') format("truetype");
		}
	</style>
	<link href="./css/default.css" type="text/css" rel="stylesheet">
	<script type="text/javascript" src="./js/jquery.js"></script>
	<script type="text/javascript" src="./js/garden.js"></script>
	<script type="text/javascript" src="./js/functions.js"></script>
	<script type="text/javascript" src="./js/functions_dev.js"></script>
</head>

<body>
	<audio src="./567.mp3" autoplay="autoplay" loop=""></audio>
	<div id="mainDiv">
		<div id="content">
			<div id="code">
				<span class="comments">Hi, 大黑</span><br />
				<span class="space" /><span class="comments">谢谢你出现在我身边</span><br />
				<span class="space" /><span class="comments">希望我们不忘初心，方得始终</span><br />
				<span class="space" /><span class="comments">你的世界有我，心里有我才最重要</span><br />
				<span class="space" /><span class="comments"></span>小星星 ✨!<br />

				<span class="keyword">你要注意身体，少熬夜<br />
					<span class="space" />以后要好好的保护我哦<br />
					<span class="space" />我们说好要一起旅行的<br />
					<span class="space" />记录我们经历的点点滴滴，<br /> 加油！^_^</span> <br />
				<br />
			</div>
			<div id="loveHeart">
				<canvas id="garden"></canvas>
				<div id="words">
					<div id="messages">
						大黑,我喜欢你！
						<div id="elapseClock"></div>
					</div>
					<div id="loveu">
						你的<br />
						<div class="signature">- 小白</div>
					</div>
				</div>
			</div>
		</div>

	</div>
	<script type="text/javascript">
		var offsetX = $("#loveHeart").width() / 2;
		var offsetY = $("#loveHeart").height() / 2 - 55;
		var together = new Date();
		together.setFullYear(2020, 8, 13);
		together.setHours(10);
		together.setMinutes(04);
		together.setSeconds(0);
		together.setMilliseconds(0);

		if (!document.createElement('canvas').getContext) {
			var msg = document.createElement("div");
			msg.id = "errorMsg";
			msg.innerHTML = "Your browser doesn't support HTML5!<br/>Recommend use Chrome 14+/IE 9+/Firefox 7+/Safari 4+";
			document.body.appendChild(msg);
			$("#code").css("display", "none")
			$("#copyright").css("position", "absolute");
			$("#copyright").css("bottom", "10px");
			document.execCommand("stop");
		} else {
			setTimeout(function () {
				startHeartAnimation();
			}, 2000);

			timeElapse(together);
			setInterval(function () {
				timeElapse(together);
			}, 500);

			adjustCodePosition();
			$("#code").typewriter();
		}
	</script>
</body>

</html>
